<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mindlabsion — 마음을 나누는 공간</title>
  <style>
    :root {
      --white:  #feffff;
      --beige:  #dddac9;
      --green:  #6b9e00;
      --brown:  #a27853;
      --green-dark: #4e7400;
      --green-light: #eef4e0;
      --brown-light: #f7f0e9;
      --text:   #2c2c2c;
      --muted:  #777;
      --border: #d6d3c2;
      --radius: 10px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f4f2eb; color: var(--text); min-height: 100vh; }

    /* ── PAGE VISIBILITY ── */
    .page { display: none; }
    .page.active { display: block; }

    /* ══════════════════════════════
       LOGIN PAGE
    ══════════════════════════════ */
    #page-login {
      min-height: 100vh;
      background: linear-gradient(160deg, #f7f5ee 0%, #e8e4d0 100%);
      display: none; align-items: center; justify-content: center;
      padding: 24px;
    }
    #page-login.active { display: flex; }

    .login-wrap { width: 100%; max-width: 420px; }
    .login-logo {
      text-align: center;
      margin-bottom: 36px;
    }
    .login-logo .logo-mark {
      display: inline-flex; align-items: center; justify-content: center;
      width: 64px; height: 64px;
      background: var(--green);
      border-radius: 18px;
      font-size: 2rem;
      margin-bottom: 12px;
    }
    .login-logo h1 { font-size: 1.6rem; font-weight: 800; color: var(--green-dark); letter-spacing: -0.5px; }
    .login-logo p { color: var(--muted); font-size: 0.9rem; margin-top: 4px; }

    .login-card {
      background: var(--white);
      border-radius: 18px;
      padding: 36px 32px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .login-card h2 { font-size: 1.1rem; font-weight: 700; margin-bottom: 24px; color: var(--text); }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--muted); margin-bottom: 6px; }
    .form-group input {
      width: 100%; padding: 11px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      font-size: 0.95rem; color: var(--text);
      background: #fafaf6;
      outline: none; transition: border-color .2s;
    }
    .form-group input:focus { border-color: var(--green); background: var(--white); }

    .btn-primary {
      width: 100%; padding: 13px;
      background: var(--green); color: var(--white);
      font-size: 0.95rem; font-weight: 700;
      border: none; border-radius: var(--radius);
      cursor: pointer; transition: background .2s;
      margin-top: 4px;
    }
    .btn-primary:hover { background: var(--green-dark); }

    .login-divider { text-align: center; color: var(--muted); font-size: 0.82rem; margin: 16px 0; }
    .btn-guest {
      width: 100%; padding: 11px;
      background: var(--brown-light); color: var(--brown);
      font-size: 0.9rem; font-weight: 600;
      border: 1.5px solid #d4b89a; border-radius: var(--radius);
      cursor: pointer; transition: background .2s;
    }
    .btn-guest:hover { background: #eeddd0; }
    .signup-link { display: none; }

    /* ══════════════════════════════
       MAIN LAYOUT (after login)
    ══════════════════════════════ */
    #page-main, #page-detail, #page-counsel {
      min-height: 100vh;
      background: #f4f2eb;
    }

    /* ── TOP NAV ── */
    .topnav {
      background: var(--white);
      border-bottom: 2px solid var(--beige);
      position: sticky; top: 0; z-index: 100;
    }
    .topnav-inner {
      max-width: 1100px; margin: 0 auto;
      padding: 0 20px;
      display: flex; align-items: center; gap: 16px;
      height: 56px;
    }
    .nav-logo {
      display: flex; align-items: center; gap: 10px;
      cursor: pointer; text-decoration: none;
    }
    .nav-logo .dot {
      width: 32px; height: 32px;
      background: var(--green); border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; color: white;
    }
    .nav-logo span { font-size: 1.05rem; font-weight: 800; color: var(--green-dark); letter-spacing: -0.3px; }
    .nav-links { display: flex; gap: 4px; margin-left: 16px; }
    .nav-links a {
      padding: 6px 14px; border-radius: 7px;
      font-size: 0.88rem; font-weight: 600; color: var(--muted);
      cursor: pointer; text-decoration: none; transition: all .15s;
    }
    .nav-links a:hover, .nav-links a.active { background: var(--green-light); color: var(--green-dark); }
    .nav-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
    .nav-avatar {
      width: 34px; height: 34px; border-radius: 50%;
      background: var(--beige); display: flex; align-items: center; justify-content: center;
      font-size: 0.85rem; font-weight: 700; color: var(--brown); cursor: pointer;
      border: 2px solid var(--brown-light);
    }
    .btn-logout {
      font-size: 0.82rem; color: var(--muted); background: none;
      border: 1px solid var(--border); border-radius: 6px;
      padding: 5px 10px; cursor: pointer;
    }
    .btn-logout:hover { color: #c00; border-color: #c00; }

    /* ── SIDEBAR + CONTENT ── */
    .layout {
      max-width: 1100px; margin: 0 auto;
      padding: 24px 20px;
      display: grid;
      grid-template-columns: 220px 1fr;
      gap: 20px;
    }
    @media(max-width:700px) { .layout { grid-template-columns: 1fr; } }

    /* sidebar */
    .sidebar { display: flex; flex-direction: column; gap: 14px; }
    .sidebar-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .sidebar-card .s-head {
      background: var(--beige);
      padding: 10px 14px;
      font-size: 0.82rem; font-weight: 700; color: var(--brown);
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .sidebar-menu { list-style: none; }
    .sidebar-menu li a {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px; font-size: 0.88rem; color: var(--text);
      cursor: pointer; text-decoration: none; transition: background .15s;
      border-bottom: 1px solid #f0ede2;
    }
    .sidebar-menu li:last-child a { border-bottom: none; }
    .sidebar-menu li a:hover { background: var(--green-light); color: var(--green-dark); }
    .sidebar-menu li a.active { background: var(--green-light); color: var(--green-dark); font-weight: 700; }
    .sidebar-menu li a .cnt {
      margin-left: auto; background: var(--green);
      color: white; font-size: 0.72rem; font-weight: 700;
      border-radius: 10px; padding: 1px 7px;
    }

    .sidebar-stats { padding: 14px; }
    .stat-row { display: flex; justify-content: space-between; font-size: 0.82rem; padding: 4px 0; }
    .stat-row .lbl { color: var(--muted); }
    .stat-row .val { font-weight: 700; color: var(--green-dark); }

    /* ── CONTENT AREA ── */
    .content { min-width: 0; }

    /* board header */
    .board-header {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 24px;
      margin-bottom: 14px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .board-header h2 { font-size: 1.1rem; font-weight: 800; }
    .board-header p { font-size: 0.82rem; color: var(--muted); margin-top: 2px; }
    .btn-write {
      padding: 8px 18px;
      background: var(--green); color: white;
      font-size: 0.85rem; font-weight: 700;
      border: none; border-radius: 7px;
      cursor: pointer; white-space: nowrap;
      transition: background .2s;
    }
    .btn-write:hover { background: var(--green-dark); }

    /* post list */
    .post-list { display: flex; flex-direction: column; gap: 10px; }
    .post-item {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      cursor: pointer;
      transition: box-shadow .15s, border-color .15s;
      display: flex; align-items: flex-start; gap: 14px;
    }
    .post-item:hover { box-shadow: 0 2px 12px rgba(107,158,0,.12); border-color: var(--green); }
    .post-badge {
      padding: 3px 10px; border-radius: 5px;
      font-size: 0.72rem; font-weight: 700;
      white-space: nowrap; margin-top: 2px;
    }
    .badge-free     { background: #e8f4d0; color: #4e7400; }
    .badge-counsel  { background: #fdecea; color: #c62828; }
    .badge-notice   { background: #fff3e0; color: #e65100; }
    .badge-qna      { background: #e8eaf6; color: #3949ab; }

    .post-body { flex: 1; min-width: 0; }
    .post-title { font-size: 0.95rem; font-weight: 700; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .post-preview { font-size: 0.82rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .post-meta { display: flex; gap: 12px; margin-top: 8px; font-size: 0.78rem; color: var(--muted); }
    .post-meta span { display: flex; align-items: center; gap: 3px; }
    .post-stat { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; font-size: 0.78rem; color: var(--muted); white-space: nowrap; }
    .hot-badge { background: var(--brown); color: white; border-radius: 4px; padding: 1px 6px; font-size: 0.7rem; font-weight: 700; }

    /* ── WRITE MODAL ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.4); z-index: 200;
      align-items: center; justify-content: center; padding: 20px;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--white); border-radius: 16px;
      width: 100%; max-width: 580px;
      padding: 32px 28px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.18);
    }
    .modal h3 { font-size: 1.1rem; font-weight: 800; margin-bottom: 20px; }
    .modal select, .modal input[type=text], .modal textarea {
      width: 100%; padding: 10px 14px;
      border: 1.5px solid var(--border); border-radius: 8px;
      font-size: 0.9rem; color: var(--text);
      background: #fafaf6; outline: none;
      transition: border-color .2s; margin-bottom: 12px;
      font-family: inherit;
    }
    .modal select:focus, .modal input:focus, .modal textarea:focus { border-color: var(--green); }
    .modal textarea { min-height: 130px; resize: vertical; }
    .modal-btns { display: flex; gap: 10px; justify-content: flex-end; margin-top: 4px; }
    .btn-cancel {
      padding: 9px 20px; border: 1.5px solid var(--border);
      background: none; border-radius: 8px;
      font-size: 0.88rem; color: var(--muted); cursor: pointer;
    }
    .btn-submit {
      padding: 9px 24px; background: var(--green); color: white;
      border: none; border-radius: 8px;
      font-size: 0.88rem; font-weight: 700; cursor: pointer;
    }
    .btn-submit:hover { background: var(--green-dark); }

    /* ══════════════════════════════
       POST DETAIL PAGE
    ══════════════════════════════ */
    .detail-wrap {
      max-width: 780px; margin: 0 auto; padding: 24px 20px;
    }
    .back-btn {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 0.85rem; color: var(--muted); cursor: pointer;
      background: none; border: none; margin-bottom: 16px;
      padding: 6px 10px; border-radius: 6px;
    }
    .back-btn:hover { background: var(--beige); color: var(--text); }

    .detail-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px 28px;
      margin-bottom: 16px;
    }
    .detail-header { margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
    .detail-header .d-badge { margin-bottom: 10px; }
    .detail-header h1 { font-size: 1.2rem; font-weight: 800; margin-bottom: 10px; }
    .detail-info { display: flex; gap: 16px; font-size: 0.82rem; color: var(--muted); flex-wrap: wrap; }
    .detail-body { font-size: 0.93rem; line-height: 1.8; color: #333; white-space: pre-wrap; }

    .detail-actions { display: flex; gap: 10px; margin-top: 20px; }
    .action-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 7px 16px; border-radius: 7px;
      font-size: 0.85rem; cursor: pointer; transition: all .15s;
      border: 1.5px solid var(--border); background: none; color: var(--muted);
    }
    .action-btn:hover { border-color: var(--green); color: var(--green); }
    .action-btn.liked { border-color: var(--green); color: var(--green); background: var(--green-light); font-weight: 700; }

    /* comments */
    .comment-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px 28px;
    }
    .comment-card h3 { font-size: 0.95rem; font-weight: 800; margin-bottom: 16px; }
    .comment-list { display: flex; flex-direction: column; gap: 0; }
    .comment-item {
      padding: 14px 0;
      border-bottom: 1px solid #f0ede2;
    }
    .comment-item:last-child { border-bottom: none; }
    .c-top { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .c-avatar {
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--beige); display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem; font-weight: 700; color: var(--brown);
    }
    .c-name { font-size: 0.85rem; font-weight: 700; }
    .c-time { font-size: 0.75rem; color: var(--muted); margin-left: auto; }
    .c-body { font-size: 0.88rem; color: #444; line-height: 1.6; padding-left: 36px; }

    .comment-input-wrap { margin-top: 16px; }
    .comment-input-wrap textarea {
      width: 100%; padding: 10px 14px;
      border: 1.5px solid var(--border); border-radius: 8px;
      font-size: 0.88rem; resize: vertical; min-height: 80px;
      background: #fafaf6; outline: none; font-family: inherit;
      transition: border-color .2s;
    }
    .comment-input-wrap textarea:focus { border-color: var(--green); }
    .comment-input-wrap .c-submit {
      display: flex; justify-content: flex-end; margin-top: 8px;
    }
    .c-submit button {
      padding: 8px 20px; background: var(--green); color: white;
      border: none; border-radius: 7px; font-size: 0.85rem; font-weight: 700; cursor: pointer;
    }
    .c-submit button:hover { background: var(--green-dark); }

    /* counsel special */
    .counsel-tip {
      background: #fff8f0;
      border: 1px solid #f0d5b0;
      border-left: 4px solid var(--brown);
      border-radius: 8px;
      padding: 14px 18px;
      font-size: 0.85rem;
      color: #6b4a2a;
      margin-bottom: 16px;
    }
    .counsel-tip strong { display: block; margin-bottom: 4px; color: var(--brown); }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
      background: #2c2c2c; color: white;
      padding: 10px 22px; border-radius: 30px;
      font-size: 0.88rem; font-weight: 600;
      opacity: 0; pointer-events: none;
      transition: opacity .3s;
      z-index: 999; white-space: nowrap;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

<!-- ══════ LOGIN PAGE ══════ -->
<div id="page-login" class="page active">
  <div class="login-wrap">
    <div class="login-logo">
      <div class="logo-mark">🌿</div>
      <h1>Mindlabsion</h1>
      <p>마음을 나누고, 생각을 키우는 공간</p>
    </div>
    <div class="login-card">
      <h2>로그인</h2>
      <div class="form-group">
        <label>아이디</label>
        <input type="text" id="inp-id" placeholder="아이디를 입력하세요" />
      </div>
      <div class="form-group">
        <label>비밀번호</label>
        <input type="password" id="inp-pw" placeholder="비밀번호를 입력하세요" />
      </div>
      <button class="btn-primary" onclick="doLogin()">로그인</button>
      <div class="login-divider">또는</div>
      <button class="btn-guest" onclick="guestLogin()">👤 게스트로 둘러보기</button>
      <div class="signup-link">계정이 없으신가요? <a onclick="showPage('page-signup')">회원가입</a></div>
    </div>
  </div>
</div>

<!-- ══════ MAIN PAGE ══════ -->
<div id="page-main" class="page">
  <!-- topnav -->
  <nav class="topnav">
    <div class="topnav-inner">
      <a class="nav-logo" onclick="showPage('page-main')">
        <div class="dot">🌿</div>
        <span>Mindlabsion</span>
      </a>
      <div class="nav-links">
        <a id="nav-free"    class="active"  onclick="filterBoard('전체')">전체</a>
        <a id="nav-counsel"              onclick="filterBoard('고민상담')">고민상담</a>
        <a id="nav-qna"                  onclick="filterBoard('질문')">Q&A</a>
      </div>
      <div class="nav-right">
        <div class="nav-avatar" id="nav-avatar">?</div>
        <button class="btn-logout" onclick="doLogout()">로그아웃</button>
      </div>
    </div>
  </nav>

  <div class="layout">
    <!-- sidebar -->
    <aside class="sidebar">
      <div class="sidebar-card">
        <div class="s-head">게시판</div>
        <ul class="sidebar-menu">
          <li><a class="active" onclick="filterBoard('전체')">📋 전체글</a></li>
          <li><a onclick="filterBoard('공지')">📢 공지사항</a></li>
          <li><a onclick="filterBoard('자유')">💬 자유게시판</a></li>
          <li><a onclick="filterBoard('고민상담')">🫂 고민상담 <span class="cnt" id="counsel-cnt">0</span></a></li>
          <li><a onclick="filterBoard('질문')">❓ Q&A</a></li>
        </ul>
      </div>
      <div class="sidebar-card">
        <div class="s-head">커뮤니티 현황</div>
        <div class="sidebar-stats">
          <div class="stat-row"><span class="lbl">전체 글</span><span class="val" id="stat-total">0</span></div>
          <div class="stat-row"><span class="lbl">오늘 글</span><span class="val">3</span></div>
          <div class="stat-row"><span class="lbl">전체 회원</span><span class="val">128</span></div>
          <div class="stat-row"><span class="lbl">접속 중</span><span class="val">12</span></div>
        </div>
      </div>
    </aside>

    <!-- content -->
    <main class="content">
      <div class="board-header">
        <div>
          <h2 id="board-title">📋 전체 게시판</h2>
          <p id="board-desc">Mindlabsion의 모든 게시글을 확인하세요</p>
        </div>
        <button class="btn-write" onclick="openWriteModal()">✏️ 글쓰기</button>
      </div>
      <div class="post-list" id="post-list"></div>
    </main>
  </div>
</div>

<!-- ══════ DETAIL PAGE ══════ -->
<div id="page-detail" class="page">
  <nav class="topnav">
    <div class="topnav-inner">
      <a class="nav-logo" onclick="showPage('page-main')">
        <div class="dot">🌿</div>
        <span>Mindlabsion</span>
      </a>
      <div class="nav-right">
        <div class="nav-avatar" id="nav-avatar2">?</div>
        <button class="btn-logout" onclick="doLogout()">로그아웃</button>
      </div>
    </div>
  </nav>
  <div class="detail-wrap">
    <button class="back-btn" onclick="showPage('page-main')">← 목록으로</button>
    <div id="detail-content"></div>
  </div>
</div>

<!-- ══════ WRITE MODAL ══════ -->
<div class="modal-overlay" id="write-modal">
  <div class="modal">
    <h3>✏️ 새 글 작성</h3>
    <select id="w-category">
      <option value="자유">💬 자유게시판</option>
      <option value="고민상담">🫂 고민상담</option>
      <option value="질문">❓ Q&A</option>
    </select>
    <input type="text" id="w-title" placeholder="제목을 입력하세요" />
    <textarea id="w-body" placeholder="내용을 입력하세요..."></textarea>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeWriteModal()">취소</button>
      <button class="btn-submit" onclick="submitPost()">등록하기</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
  // ── STATE ──
  let currentUser = null;
  let currentFilter = '전체';
  let currentPostId = null;


  const BOARD_META = {
    '전체':    { title: '📋 전체 게시판',   desc: 'Mindlabsion의 모든 게시글을 확인하세요' },
    '공지':    { title: '📢 공지사항',       desc: '운영진의 공지를 확인하세요' },
    '자유':    { title: '💬 자유게시판',     desc: '자유롭게 이야기를 나눠보세요' },
    '고민상담':{ title: '🫂 고민상담',       desc: '고민을 털어놓고 따뜻한 위로를 받아보세요' },

  // ── UTILS ──
  function showPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    if (id === 'page-main') renderPosts();
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  function initAvatars() {
    const letter = currentUser ? currentUser[0].toUpperCase() : '?';
    document.querySelectorAll('.nav-avatar').forEach(el => el.textContent = letter);
  }

  // ── AUTH ──
  function doLogin() {
    const id = document.getElementById('inp-id').value.trim();
    const pw = document.getElementById('inp-pw').value;
    if (!id) { showToast('아이디를 입력하세요'); return; }
    if (!pw) { showToast('비밀번호를 입력하세요'); return; }
    currentUser = id;
    initAvatars();
    showPage('page-main');
    renderPosts();
    showToast(`${id}님, 환영합니다! 🌿`);
  }

  function guestLogin() {
    currentUser = '게스트';
    initAvatars();
    showPage('page-main');
    renderPosts();
    showToast('게스트로 접속했습니다');
  }

  function doLogout() {
    currentUser = null;
    document.getElementById('inp-id').value = '';
    document.getElementById('inp-pw').value = '';
    showPage('page-login');
    showToast('로그아웃 되었습니다');
  }


  // ── BOARD ──
  function filterBoard(cat) {
    currentFilter = cat;
    const meta = BOARD_META[cat] || BOARD_META['전체'];
    document.getElementById('board-title').textContent = meta.title;
    document.getElementById('board-desc').textContent  = meta.desc;
    renderPosts();
    showPage('page-main');
  }

  function renderPosts() {
    const list = document.getElementById('post-list');
    const filtered = currentFilter === '전체'
      ? posts
      : posts.filter(p => p.category === currentFilter);

    document.getElementById('stat-total').textContent = posts.length;
    document.getElementById('counsel-cnt').textContent = posts.filter(p=>p.category==='고민상담').length;

    if (!filtered.length) {
      list.innerHTML = '<div style="text-align:center;padding:60px 0;color:var(--muted);font-size:.9rem;">게시글이 없습니다 🍃</div>';
      return;
    }

    list.innerHTML = filtered.map(p => `
      <div class="post-item" onclick="openPost(${p.id})">
        <div>${BADGE[p.category]||''}</div>
        <div class="post-body">
          <div class="post-title">${p.title}</div>
          <div class="post-preview">${p.body.replace(/\n/g,' ').substring(0,60)}...</div>
          <div class="post-meta">
            <span>👤 ${p.author}</span>
            <span>🕐 ${p.date}</span>
            <span>💬 ${p.comments.length}</span>
          </div>
        </div>
        <div class="post-stat">
          ${p.hot ? '<span class="hot-badge">HOT</span>' : ''}
          <span>👁 ${p.views}</span>
          <span>❤️ ${p.likes}</span>
        </div>
      </div>
    `).join('');
  }

  // ── POST DETAIL ──
  function openPost(id) {
    currentPostId = id;
    const p = posts.find(x => x.id === id);
    if (!p) return;
    p.views++;

    const isCounsel = p.category === '고민상담';

    const commentsHtml = p.comments.length
      ? p.comments.map(c => `
          <div class="comment-item">
            <div class="c-top">
              <div class="c-avatar">${c.author[0]}</div>
              <span class="c-name">${c.author}</span>
              <span class="c-time">${c.date}</span>
            </div>
            <div class="c-body">${c.body}</div>
          </div>`).join('')
      : '<div style="text-align:center;padding:20px 0;color:var(--muted);font-size:.85rem;">첫 번째 댓글을 남겨보세요 🌱</div>';

    document.getElementById('detail-content').innerHTML = `
      <div class="detail-card">
        ${isCounsel ? `
          <div class="counsel-tip">
            <strong>🫂 고민상담 게시판</strong>
            이곳은 서로의 고민을 들어주고 따뜻한 말 한마디를 나누는 공간입니다. 비판보다는 공감과 응원을 보내주세요.
          </div>` : ''}
        <div class="detail-header">
          <div class="d-badge">${BADGE[p.category]||''}</div>
          <h1>${p.title}</h1>
          <div class="detail-info">
            <span>👤 ${p.author}</span>
            <span>🕐 ${p.date}</span>
            <span>👁 조회 ${p.views}</span>
            <span>❤️ 좋아요 <span id="like-count">${p.likes}</span></span>
            <span>💬 댓글 ${p.comments.length}</span>
          </div>
        </div>
        <div class="detail-body">${p.body}</div>
        <div class="detail-actions">
          <button class="action-btn" id="like-btn" onclick="toggleLike(${p.id})">❤️ 좋아요 <span id="like-num">${p.likes}</span></button>
          <button class="action-btn" onclick="showToast('URL이 복사되었습니다!')">🔗 공유</button>
        </div>
      </div>

      <div class="comment-card">
        <h3>💬 댓글 ${p.comments.length}개</h3>
        <div class="comment-list" id="comment-list">${commentsHtml}</div>
        <div class="comment-input-wrap">
          <textarea id="c-input" placeholder="${isCounsel ? '따뜻한 한마디를 남겨주세요 🫂' : '댓글을 입력하세요...'}"></textarea>
          <div class="c-submit">
            <button onclick="submitComment(${p.id})">댓글 등록</button>
          </div>
        </div>
      </div>
    `;

    showPage('page-detail');
    window.scrollTo(0,0);
  }

  function toggleLike(id) {
    const p = posts.find(x => x.id === id);
    if (!p) return;
    p.likes++;
    document.getElementById('like-num').textContent = p.likes;
    const btn = document.getElementById('like-btn');
    btn.classList.add('liked');
    showToast('좋아요를 눌렀습니다 ❤️');
  }

  function submitComment(postId) {
    const input = document.getElementById('c-input');
    const body = input.value.trim();
    if (!body) { showToast('댓글을 입력하세요'); return; }
    if (!currentUser || currentUser === '게스트') { showToast('로그인 후 댓글을 작성할 수 있습니다'); return; }

    const p = posts.find(x => x.id === postId);
    const now = new Date();
    const date = `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')}`;

    p.comments.push({ id: Date.now(), author: currentUser, body, date });
    input.value = '';

    const cl = document.getElementById('comment-list');
    cl.innerHTML += `
      <div class="comment-item">
        <div class="c-top">
          <div class="c-avatar">${currentUser[0]}</div>
          <span class="c-name">${currentUser}</span>
          <span class="c-time">${date}</span>
        </div>
        <div class="c-body">${body}</div>
      </div>`;
    showToast('댓글이 등록되었습니다 🌿');
  }

  // ── WRITE ──
  function openWriteModal() {
    if (!currentUser || currentUser === '게스트') {
      showToast('로그인 후 글을 작성할 수 있습니다');
      return;
    }
    document.getElementById('write-modal').classList.add('open');
  }
  function closeWriteModal() {
    document.getElementById('write-modal').classList.remove('open');
    document.getElementById('w-title').value = '';
    document.getElementById('w-body').value = '';
  }

  function submitPost() {
    const title = document.getElementById('w-title').value.trim();
    const body  = document.getElementById('w-body').value.trim();
    const cat   = document.getElementById('w-category').value;
    if (!title) { showToast('제목을 입력하세요'); return; }
    if (!body)  { showToast('내용을 입력하세요'); return; }

    const now = new Date();
    const date = `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')}`;

    posts.unshift({
      id: Date.now(), category: cat, title, body,
      author: currentUser, date,
      views: 0, likes: 0, hot: false, comments: []
    });
    closeWriteModal();
    filterBoard('전체');
    showToast('글이 등록되었습니다! 🌿');
  }

  // login enter key
  document.getElementById('inp-pw').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });
</script>
